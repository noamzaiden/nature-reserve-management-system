spring.application.name=fleetcommand
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/fleetcommand}
spring.datasource.username=${DB_USERNAME:noam}
spring.datasource.password=${DB_PASSWORD:noam-events}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

app.security.jwt.secret=${JWT_SECRET:0123456789012345678901234567890123456789012345678901234567890123}
app.security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=80MB
app.traveler-media.storage-dir=${TRAVELER_MEDIA_STORAGE_DIR:uploads/traveler-media}
app.osm.user-agent=${OSM_USER_AGENT:Fleetcommand Reserve Admin/1.0}
app.osm.nominatim-base-url=${OSM_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
app.osm.overpass-base-url=${OSM_OVERPASS_BASE_URL:https://overpass-api.de/api/interpreter}
