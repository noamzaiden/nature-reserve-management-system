services:
  db:
    image: postgres:16
    container_name: fleetcommand-db1
    environment:
      POSTGRES_DB: fleetcommand
      POSTGRES_USER: noam
      POSTGRES_PASSWORD: noam-events
    ports:
      - "5432:5432"
    volumes:
      - fleetcommand_pgdata:/var/lib/postgresql/data

volumes:
  fleetcommand_pgdata:
